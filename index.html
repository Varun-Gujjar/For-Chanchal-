<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Chanchal 🌸 ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        .gif-container img {
            width: 150px;
            margin-bottom: 20px;
        }

        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 50px;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #yesBtn:hover {
            transform: scale(1.1);
            background-color: #ff3355;
        }

        #noBtn {
            background-color: #ccc;
            color: #333;
            position: absolute;
            left: 55%;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Cute GIF -->
        <div class="gif-container">
            <img src="https://media.tenor.com/images/5f04886657929ec109d98418f4ff7fa7/tenor.gif" alt="Cute Bear">
        </div>
        
        <!-- Apka Message -->
        <h1>Will you be mine Best's Best Friend ?🤭 💖</h1>

        <!-- Buttons -->
        <div class="btn-group">
            <button id="yesBtn" onclick="acceptProposal()">Yes</button>
            <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">No</button>
        </div>
    </div>

    <script>
        // Aapka YouTube Link yahan set kar diya hai
        const youtubeLink = "https://youtube.com/shorts/jESX2GS8408?si=lnFZezKEN-pZjr3p"; 

        function acceptProposal() {
            window.location.href = youtubeLink;
        }

        function moveNoButton() {
            const noBtn = document.getElementById('noBtn');
            
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }
    </script>

</body>
</html>
