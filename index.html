<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Chanchal 🌸 ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* Falling Animation CSS */
        .falling-item {
            position: fixed;
            top: -50px;
            z-index: 999;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 85%;
            position: relative;
            z-index: 1000;
        }

        .gif-container img {
            width: 160px;
            height: 160px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        h1 {
            color: #ff4d6d;
            font-size: 20px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            height: 60px;
            align-items: center;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #noBtn {
            background-color: #ccc;
            color: #333;
        }

        .hidden { display: none; }

        .success-text {
            color: #d63384;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        #nextBtn {
            background-color: #4CAF50;
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body onclick="playMusic()">

    <audio id="bgMusic" loop>
        <source src="https://www.dropbox.com/scl/fi/v6t6i6v8a5p6s8r6n/Pal-Pal-Dil-Ke-Paas.mp3?rlkey=p6n7i5o4v3m2l1&raw=1" type="audio/mpeg">
    </audio>

    <div class="container" id="mainContainer">
        <div class="gif-container" id="gifDisplay">
            <img src="https://media.tenor.com/j8S8Lc9X968AAAAi/mochi-mochi-peach-cat-peach-cat.gif" alt="Cute Bear">
        </div>
        
        <h1 id="questionText">Will you be my best Wali Best friend Chanchal? 💖</h1>

        <div class="btn-group" id="buttonGroup">
            <button id="yesBtn" onclick="showSuccess()">Yes</button>
            <button id="noBtn" onmouseover="handleNo()" onclick="handleNo()">No</button>
        </div>
    </div>

    <div class="container hidden" id="successContainer">
        <img src="https://media.tenor.com/gU_pajBy_SIAAAAi/tkthao219-bubududu.gif" style="width:150px;">
        <div class="success-text">
            Thank you Chanchal, you are the bestt 💗<br>
            & The most gorgeous Girl in the world 😍.
        </div>
        <button id="nextBtn" onclick="goToVideo()">Next →</button>
    </div>

    <script>
        const youtubeLink = "https://youtube.com/shorts/jESX2GS8408?si=lnFZezKEN-pZjr3p";
        let musicStarted = false;

        function playMusic() {
            if (!musicStarted) {
                const music = document.getElementById('bgMusic');
                music.play().catch(e => console.log("Audio play blocked"));
                musicStarted = true;
            }
        }

        // Falling Elements Logic
        function createFallingItem() {
            const items = ['🌻', '❤️', '💛', '🎈'];
            const item = document.createElement('div');
            item.classList.add('falling-item');
            item.innerHTML = items[Math.floor(Math.random() * items.length)];
            item.style.left = Math.random() * 100 + 'vw';
            item.style.fontSize = Math.random() * (30 - 15) + 15 + 'px';
            item.style.animationDuration = Math.random() * (5 - 3) + 3 + 's';
            item.style.opacity = Math.random();
            
            document.body.appendChild(item);
            setTimeout(() => { item.remove(); }, 5000);
        }
        setInterval(createFallingItem, 300);

        const messages = [
            "Please aisa mat karo... 🥺",
            "Please man jao na yawrr Chanchal! 😭",
            "Ye last bar puch rha hu, please yes kar do.. ✨",
            "Kitni patthar dil ho yawr  Chanchal? ❤️",
            "Sunder ho to itna bhav khaogi 😞",
            "Kar lo yes abb to request hai 😩😩"
        ];

        let msgIndex = 0;

        function handleNo() {
            const noBtn = document.getElementById('noBtn');
            const yesBtn = document.getElementById('yesBtn');
            const questionText = document.getElementById('questionText');
            
            questionText.innerText = messages[msgIndex];
            
            let currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            yesBtn.style.fontSize = (currentSize + 3) + "px";

            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            msgIndex = (msgIndex + 1) % messages.length;
        }

        function showSuccess() {
            document.getElementById('mainContainer').classList.add('hidden');
            document.getElementById('successContainer').classList.remove('hidden');
        }

        function goToVideo() {
            window.location.href = youtubeLink;
        }
    </script>
</body>
</html>
