<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Chanchal 🌸 ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Dancing+Script:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            text-align: center;
            touch-action: manipulation;
        }

        /* Sunflowers and Hearts Animation */
        .falling-item {
            position: fixed;
            top: -50px;
            z-index: 999;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.92);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
            max-width: 400px;
            width: 85%;
            position: relative;
            z-index: 1000;
            border: 2px solid #ffb3c1;
        }

        .gif-container img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        h1 {
            color: #ff4d6d;
            font-family: 'Dancing Script', cursive;
            font-size: 28px;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            height: 70px;
            align-items: center;
        }

        button {
            padding: 12px 28px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #noBtn {
            background-color: #f0f0f0;
            color: #666;
            position: relative;
        }

        .hidden { display: none; }

        .success-text {
            color: #d63384;
            font-family: 'Dancing Script', cursive;
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
            line-height: 1.6;
        }

        #nextBtn {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            margin-top: 15px;
            width: 100%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body onclick="initAudio()" ontouchstart="initAudio()">

    <audio id="bgMusic" loop preload="auto">
        <source src="https://dl.dropboxusercontent.com/scl/fi/v6t6i6v8a5p6s8r6n/Pal-Pal-Dil-Ke-Paas.mp3?rlkey=p6n7i5o4v3m2l1&st=direct&raw=1" type="audio/mpeg">
    </audio>

    <div class="container" id="mainContainer">
        <div class="gif-container" id="gifDisplay">
            <img src="https://media.tenor.com/j8S8Lc9X968AAAAi/mochi-mochi-peach-cat-peach-cat.gif" alt="Cute Bear">
        </div>
        
        <h1 id="questionText">Will you be my Best wali Best Friend Chanchal? 🤭💖</h1>

        <div class="btn-group">
            <button id="yesBtn" onclick="showSuccess()">Yes</button>
            <button id="noBtn" onmouseover="handleNo()" onclick="handleNo()">No</button>
        </div>
    </div>

    <div class="container hidden" id="successContainer">
        <img src="https://media.tenor.com/gU_pajBy_SIAAAAi/tkthao219-bubududu.gif" style="width:160px;">
        <div class="success-text">
            Thank you Chanchal, you are the bestt 💗<br>
            & The most gorgeous Girl hehehe😁😍.
        </div>
        <button id="nextBtn" onclick="goToVideo()">Next: Watch Surprise →</button>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        let audioStarted = false;

        // Function to start music on first touch
        function initAudio() {
            if (!audioStarted) {
                audio.play().then(() => {
                    audioStarted = true;
                }).catch(e => console.log("Waiting for user interaction..."));
            }
        }

        // Falling Elements (Hearts, Flowers, Balloons)
        function createFallingItem() {
            const items = ['🌻', '❤️', '🪷', '🎈', '🌸'];
            const item = document.createElement('div');
            item.classList.add('falling-item');
            item.innerHTML = items[Math.floor(Math.random() * items.length)];
            item.style.left = Math.random() * 100 + 'vw';
            item.style.fontSize = Math.random() * 25 + 15 + 'px';
            item.style.animationDuration = Math.random() * 3 + 2 + 's';
            item.style.opacity = Math.random() * 0.8 + 0.2;
            
            document.body.appendChild(item);
            setTimeout(() => { item.remove(); }, 5000);
        }
        setInterval(createFallingItem, 250);

        const messages = [
            "Please aisa mat karo... 🥺",
            "Please man jao na yawrr Chanchal! 😭",
            "Ye last bar puch rha hu, please yes kar do.. ✨",
            "Kitni patthar dil ho yr Chanchal😞",
            "Maan jaiye na! ❤️",
            "Sunder ho to bhav khaogi kya 😩",
            "Oye Sundriii Man ja yawrr Chanchal",
            "Request hai yawrr abb yes kardo👉👈",
        ];

        const gifs = [
            "https://media.tenor.com/X_v0S96Y89AAAAAi/sad-cry.gif",
            "https://media.tenor.com/07706_X6_64AAAAAi/peach-goma.gif",
            "https://media.tenor.com/T0_6InXvX8QAAAAi/mochi-peach.gif",
            "https://media.tenor.com/6_m-r8p_7p8AAAAi/mochi-cat.gif"
        ];

        let msgIndex = 0;

        function handleNo() {
            initAudio(); // Play music if not already playing
            const noBtn = document.getElementById('noBtn');
            const yesBtn = document.getElementById('yesBtn');
            const questionText = document.getElementById('questionText');
            const gifDisplay = document.querySelector('#gifDisplay img');

            // Change Text and GIF
            questionText.innerText = messages[msgIndex];
            gifDisplay.src = gifs[msgIndex];

            // Make Yes Button grow
            let currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            yesBtn.style.fontSize = (currentSize + 3) + "px";
            yesBtn.style.padding = (parseFloat(window.getComputedStyle(yesBtn).padding) + 2) + "px";

            // Move No Button
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            msgIndex = (msgIndex + 1) % messages.length;
        }

        function showSuccess() {
            initAudio();
            document.getElementById('mainContainer').classList.add('hidden');
            document.getElementById('successContainer').classList.remove('hidden');
        }

        function goToVideo() {
            window.location.href = "https://youtube.com/shorts/jESX2GS8408?si=lnFZezKEN-pZjr3p";
        }
    </script>
</body>
</html>
