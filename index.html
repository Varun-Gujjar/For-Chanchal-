<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Chanchal 🌸 ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 85%;
            position: relative;
            transition: all 0.3s ease;
        }

        .gif-container img {
            width: 160px;
            height: 160px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        h1 {
            color: #ff4d6d;
            font-size: 22px;
            margin-bottom: 25px;
            min-height: 60px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            position: relative;
            height: 50px;
        }

        button {
            padding: 10px 25px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            z-index: 100;
        }

        #noBtn {
            background-color: #ccc;
            color: #333;
            transition: 0.1s;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gif-container" id="gifDisplay">
            <img src="https://media.tenor.com/j8S8Lc9X968AAAAi/mochi-mochi-peach-cat-peach-cat.gif" alt="Cute Bear">
        </div>
        
        <h1 id="questionText">Will you be my Best wali Best Frinds Chanchal? 😁💖</h1>

        <div class="btn-group">
            <button id="yesBtn" onclick="acceptProposal()">Yes</button>
            <button id="noBtn" onmouseover="handleNo()" onclick="handleNo()">No</button>
        </div>
    </div>

    <script>
        const youtubeLink = "https://youtube.com/shorts/jESX2GS8408?si=lnFZezKEN-pZjr3p";
        
        const messages = [
            "Please aisa mat karo... 🥺",
            "Please man jao na yawrr Chanchal! 😭",
            "Ye last bar puch rha hu, please yes kar do.. ✨",
            "Maafi de do, par No mat bolo.. 🧸",
            "Kitni Pathhar dil ho Chanchal? Maan jaiye na! ❤️"
        ];

        const gifs = [
            "https://media.tenor.com/X_v0S96Y89AAAAAi/sad-cry.gif", // Crying
            "https://media.tenor.com/07706_X6_64AAAAAi/peach-goma.gif", // Pleading
            "https://media.tenor.com/T0_6InXvX8QAAAAi/mochi-peach.gif", // Super sad
            "https://media.tenor.com/yU_v1Anu49AAAAAi/sad-mochi-cat.gif", // Heartbroken
            "https://media.tenor.com/6_m-r8p_7p8AAAAi/mochi-cat.gif" // Pouting
        ];

        let msgIndex = 0;

        function handleNo() {
            const noBtn = document.getElementById('noBtn');
            const yesBtn = document.getElementById('yesBtn');
            const questionText = document.getElementById('questionText');
            const gifDisplay = document.getElementById('gifDisplay').querySelector('img');

            // 1. Change Message
            questionText.innerText = messages[msgIndex];
            
            // 2. Change GIF
            gifDisplay.src = gifs[msgIndex];

            // 3. Make Yes Button bigger and No button move
            let currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            yesBtn.style.fontSize = (currentSize + 2) + "px";
            yesBtn.style.padding = (parseFloat(yesBtn.style.padding) + 2) + "px";

            // 4. Move No Button randomly
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            // Increase index for next message
            msgIndex = (msgIndex + 1) % messages.length;
        }

        function acceptProposal() {
            window.location.href = youtubeLink;
        }
    </script>

</body>
</html>
